<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Live Text Chat - Search Mode</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --border-color: #333;
            --primary-color: #0A84FF;
            --error-color: #FF453A;
            --text-color: #e0e0e0;
            --text-muted: #888;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --chat-font-size: 1.2rem;
            --chat-font-weight: 500;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .secret-area {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #secretCode {
            flex-grow: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        #connectBtn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 160px;
        }

        #connectBtn:disabled { background-color: #444; cursor: wait; }

        /* メッセージ表示 */
        #statusDisplay {
            text-align: center;
            font-size: 0.9rem;
            min-height: 1.2rem;
            color: var(--primary-color);
        }

        .chat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            opacity: 0.3;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .chat-grid.active {
            opacity: 1;
            pointer-events: auto;
        }

        .chat-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .label {
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #555;
            border-radius: 50%;
        }
        .status-dot.active { background-color: #30d158; }

        textarea, .display-area {
            width: 100%;
            height: 350px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            color: var(--text-color);
            font-size: var(--chat-font-size);
            font-weight: var(--chat-font-weight);
            line-height: 1.6;
            outline: none;
            resize: none;
        }

        .display-area {
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .chat-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="secret-area">
            <div>合言葉：</div>
            <input type="text" id="secretCode" placeholder="合言葉を入力してください" maxlength="30">
            <button id="connectBtn">この合言葉で探す</button>
        </div>
        
        <div id="statusDisplay"></div>

        <div class="chat-grid" id="chatGrid">
            <div class="chat-box">
                <div class="label"><span class="status-dot active"></span> あなた</div>
                <textarea id="myInput" placeholder="文字を入力してください..."></textarea>
            </div>

            <div class="chat-box">
                <div class="label"><span class="status-dot active"></span> 相手</div>
                <div id="remoteOutput" class="display-area"></div>
            </div>
        </div>
    </div>

    <script>
        const myInput = document.getElementById('myInput');
        const remoteOutput = document.getElementById('remoteOutput');
        const secretCodeInput = document.getElementById('secretCode');
        const connectBtn = document.getElementById('connectBtn');
        const statusDisplay = document.getElementById('statusDisplay');
        const chatGrid = document.getElementById('chatGrid');

        const PREFIX_TEXT = 'live_txt_';
        const PREFIX_USER = 'user_count_';
        let currentSecret = '';
        let myId = Math.random().toString(36).substring(2, 9);

        connectBtn.addEventListener('click', async () => {
            const code = secretCodeInput.value.trim();
            if (!code) return;

            // リセットと準備
            connectBtn.disabled = true;
            statusDisplay.innerText = "相手を探しています...";
            statusDisplay.style.color = "var(--primary-color)";
            
            // 自分の存在を登録
            const userKey = PREFIX_USER + code;
            let users = JSON.parse(localStorage.getItem(userKey) || "[]");
            
            // 3秒以上古いユーザー情報を掃除
            const now = Date.now();
            users = users.filter(u => now - u.time < 3000);
            
            if (users.length >= 2) {
                statusDisplay.innerText = "複数いるため別の合言葉にしてください";
                statusDisplay.style.color = "var(--error-color)";
                connectBtn.disabled = false;
                return;
            }

            // 自分を追加
            users.push({ id: myId, time: now });
            localStorage.setItem(userKey, JSON.stringify(users));

            // 2秒間待機して、相手が現れるか、自分が唯一かを確認
            await new Promise(resolve => setTimeout(resolve, 2500));

            // 再チェック
            const finalUsers = JSON.parse(localStorage.getItem(userKey) || "[]").filter(u => Date.now() - u.time < 5000);
            
            if (finalUsers.length === 1) {
                statusDisplay.innerText = "誰もいないため接続に失敗しました";
                statusDisplay.style.color = "var(--error-color)";
                connectBtn.disabled = false;
                // 自分の痕跡を消す
                localStorage.removeItem(userKey);
            } else if (finalUsers.length > 2) {
                statusDisplay.innerText = "複数いるため別の合言葉にしてください";
                statusDisplay.style.color = "var(--error-color)";
                connectBtn.disabled = false;
            } else {
                // 接続成功
                statusDisplay.innerText = "接続に成功しました！";
                statusDisplay.style.color = "#30d158";
                currentSecret = code;
                chatGrid.classList.add('active');
                secretCodeInput.disabled = true;
                
                // 定期的に生存報告（心拍）を送る
                setInterval(() => {
                    let heartbeat = JSON.parse(localStorage.getItem(userKey) || "[]");
                    heartbeat = heartbeat.map(u => u.id === myId ? {id: myId, time: Date.now()} : u);
                    localStorage.setItem(userKey, JSON.stringify(heartbeat));
                }, 1000);
            }
        });

        myInput.addEventListener('input', () => {
            if (currentSecret) {
                localStorage.setItem(PREFIX_TEXT + currentSecret, myInput.value);
            }
        });

        window.addEventListener('storage', (e) => {
            if (currentSecret && e.key === PREFIX_TEXT + currentSecret) {
                remoteOutput.innerText = e.newValue || '';
                remoteOutput.scrollTop = remoteOutput.scrollHeight;
            }
        });
    </script>
</body>
</html>
