<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Sync Live Chat</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --border-color: #333;
            --primary-color: #0A84FF;
            --text-color: #ffffff;
            --text-muted: #888;
            --chat-font-size: 1.2rem;
            --chat-font-weight: 500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* プロフィール・接続カード */
        .setup-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .card-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .my-id-display {
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--primary-color);
            background: #000;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px dashed var(--primary-color);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        input#targetId {
            flex-grow: 1;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        button#connectBtn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* チャット画面 */
        .chat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            opacity: 0.1;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .chat-grid.active {
            opacity: 1;
            pointer-events: auto;
        }

        .chat-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        textarea, .display-area {
            width: 100%;
            height: 400px;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: var(--chat-font-size);
            font-weight: var(--chat-font-weight);
            line-height: 1.6;
            outline: none;
            resize: none;
        }

        .display-area {
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
        }

        /* レスポンシブ */
        @media (max-width: 700px) {
            .setup-section, .chat-grid { grid-template-columns: 1fr; }
            textarea, .display-area { height: 30vh; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-section">
        <div class="card">
            <span class="card-label">あなたの固定ID（相手に教えてください）</span>
            <div id="myIdDisplay" class="my-id-display">----</div>
        </div>
        <div class="card">
            <span class="card-label">接続したい相手のIDを入力</span>
            <div class="input-group">
                <input type="text" id="targetId" placeholder="相手のIDを貼り付け">
                <button id="connectBtn">探す</button>
            </div>
        </div>
    </div>

    <div id="statusInfo" style="text-align: center; font-size: 0.9rem; color: var(--primary-color);"></div>

    <div class="chat-grid" id="chatGrid">
        <div class="chat-box">
            <span class="card-label">あなた</span>
            <textarea id="myInput" placeholder="ここに入力..."></textarea>
        </div>
        <div class="chat-box">
            <span class="card-label">相手</span>
            <div id="remoteOutput" class="display-area"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Firebaseの設定（あなたのプロジェクトのものに差し替えてください）
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 1. IDの生成と固定化 ---
    let myId = localStorage.getItem('my_chat_id');
    if (!myId) {
        myId = Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('my_chat_id', myId);
    }
    document.getElementById('myIdDisplay').innerText = myId;

    const targetIdInput = document.getElementById('targetId');
    const connectBtn = document.getElementById('connectBtn');
    const statusInfo = document.getElementById('statusInfo');
    const chatGrid = document.getElementById('chatGrid');
    const myInput = document.getElementById('myInput');
    const remoteOutput = document.getElementById('remoteOutput');

    let currentSessionPath = null;

    // --- 2. 接続ボタンの処理 ---
    connectBtn.addEventListener('click', () => {
        const targetId = targetIdInput.value.trim().toUpperCase();
        if (!targetId || targetId === myId) return;

        // IDを並び替えて一意の「ルーム名」を作る（A-BでもB-Aでも同じルームになる）
        const roomName = [myId, targetId].sort().join('_');
        startChatSession(roomName, targetId);
    });

    // --- 3. 待ち受け（相手が自分を指定したときに自動で繋がる） ---
    // あなたのIDが含まれるルームが作成されたら通知
    // ※今回は簡易化のため、明示的にボタンを押してルームを作成・監視する方式にします。

    function startChatSession(roomName, targetId) {
        currentSessionPath = `sessions/${roomName}`;
        statusInfo.innerText = `${targetId} と接続中...`;
        
        // 自分のテキスト送信先
        const myTextRef = ref(db, `${currentSessionPath}/${myId}`);
        myInput.addEventListener('input', () => {
            set(myTextRef, myInput.value);
        });

        // 相手のテキスト受信
        const remoteTextRef = ref(db, `${currentSessionPath}/${targetId}`);
        onValue(remoteTextRef, (snapshot) => {
            const val = snapshot.val();
            if (val !== null) {
                // 相手のデータが存在すれば、チャット画面をアクティブにする
                chatGrid.classList.add('active');
                statusInfo.innerText = "接続成功！";
                remoteOutput.innerText = val;
                remoteOutput.scrollTop = remoteOutput.scrollHeight;
            }
        });

        // 切断時にデータを消去（任意）
        onDisconnect(myTextRef).remove();
    }
</script>
</body>
</html>
