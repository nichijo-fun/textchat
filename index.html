<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Call - Realtime P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-color: #1a1a20;
            --accent-color: #5865f2;
            --text-color: #ffffff;
            --sub-text: #a0a0a0;
            --border-color: #303036;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100-vh;
        }

        .container {
            width: 95%;
            max-width: 900px;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }

        .my-id-container {
            background: var(--panel-color);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
        }

        #my-id {
            color: var(--accent-color);
            font-weight: bold;
            margin: 0 10px;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 0.85rem;
        }

        .btn:hover { opacity: 0.8; }

        .connection-panel {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        .status-bar {
            text-align: center;
            font-size: 0.8rem;
            color: var(--sub-text);
            margin-bottom: 10px;
        }

        .screens {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .screen-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--sub-text);
        }

        textarea, .remote-view {
            height: 400px;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            color: white;
            font-size: 1.2rem;
            line-height: 1.6;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        textarea { resize: none; outline: none; }
        textarea:focus { border-color: var(--accent-color); }

        @media (max-width: 650px) {
            .screens { grid-template-columns: 1fr; }
            textarea, .remote-view { height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Text Call</h2>
        <div class="my-id-container">
            Your ID: <span id="my-id">loading...</span>
            <button class="btn" id="copy-btn">Copy</button>
        </div>
    </header>

    <div class="connection-panel">
        <input type="text" id="target-id" placeholder="相手のIDを入力してください">
        <button class="btn" id="connect-btn">接続開始</button>
    </div>

    <div class="status-bar" id="status">Peerサーバーに接続中...</div>

    <div class="screens">
        <div class="screen-box">
            <div class="label">You (送信中)</div>
            <textarea id="local-input" placeholder="ここに文字を入力..."></textarea>
        </div>
        <div class="screen-box">
            <div class="label">Partner (受信中)</div>
            <div id="remote-output" class="remote-view"></div>
        </div>
    </div>
</div>

<script>
    // --- ID管理 ---
    // localStorageを使用して、リロードしても同じIDを保持する
    let savedId = localStorage.getItem('text-call-id-v1');
    if (!savedId) {
        // 初回のみランダムIDを生成
        savedId = 'id-' + Math.random().toString(36).substring(2, 9);
        localStorage.setItem('text-call-id-v1', savedId);
    }
    document.getElementById('my-id').textContent = savedId;

    // --- PeerJSの初期化 ---
    const peer = new Peer(savedId);
    let activeConn = null;

    const statusEl = document.getElementById('status');
    const localInput = document.getElementById('local-input');
    const remoteOutput = document.getElementById('remote-output');

    // コピー機能
    document.getElementById('copy-btn').onclick = () => {
        navigator.clipboard.writeText(savedId);
        alert('IDをコピーしました');
    };

    // 接続待機（サーバーとの接続完了）
    peer.on('open', (id) => {
        statusEl.textContent = "待機中：相手にIDを教えて接続を待つか、相手のIDを入力してください。";
    });

    // 相手からの接続を受信
    peer.on('connection', (conn) => {
        handleConnection(conn);
    });

    // 自分から接続
    document.getElementById('connect-btn').onclick = () => {
        const destId = document.getElementById('target-id').value;
        if (destId) {
            const conn = peer.connect(destId);
            handleConnection(conn);
        }
    };

    // 通信処理の共通関数
    function handleConnection(conn) {
        // すでに接続がある場合は古いものを閉じる
        if (activeConn) activeConn.close();
        activeConn = conn;

        conn.on('open', () => {
            statusEl.textContent = "接続成功！リアルタイム通信が可能です。";
            
            // 自分の入力内容をリアルタイム送信
            localInput.oninput = () => {
                if (conn.open) {
                    conn.send(localInput.value);
                }
            };
        });

        // 相手からのデータを受信
        conn.on('data', (data) => {
            remoteOutput.textContent = data;
        });

        conn.on('close', () => {
            statusEl.textContent = "接続が終了しました。";
        });

        conn.on('error', (err) => {
            console.error(err);
            statusEl.textContent = "接続エラーが発生しました。";
        });
    }

    // エラーハンドリング
    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            alert('このIDは既に使用されています。ページを再読み込みしてください。');
        } else {
            console.error(err);
        }
    });
</script>

</body>
</html>
